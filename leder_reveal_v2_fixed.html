<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lederpresentasjon – Påskeleir Gulsrud 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:
    radial-gradient(circle at 50% -8%,rgba(240,208,96,.18),transparent 28%),
    radial-gradient(circle at 18% 24%,rgba(111,79,255,.12),transparent 26%),
    radial-gradient(circle at 82% 18%,rgba(68,176,255,.1),transparent 22%),
    linear-gradient(180deg,#03050D 0%,#090E1E 38%,#050812 100%);
  font-family:Impact,'Arial Black',Arial,sans-serif;color:#fff
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 18%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 65%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 52% 12%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 77% 42%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 8%,rgba(255,255,255,.28) 0%,transparent 100%)}
body::after{content:'';position:fixed;inset:-12%;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 50% 28%,rgba(240,208,96,.12),transparent 18%),
    radial-gradient(circle at 50% 74%,rgba(95,56,255,.08),transparent 28%);
  mix-blend-mode:screen;opacity:.9;animation:ambientFloat 12s ease-in-out infinite alternate}
@keyframes ambientFloat{
  from{transform:translate3d(0,0,0) scale(1)}
  to{transform:translate3d(0,-12px,0) scale(1.04)}
}

.screen{display:none;position:fixed;inset:0;z-index:1;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.screen.on{display:flex}
.screen::before,.screen::after{content:'';position:fixed;width:44px;height:44px;border:0 solid #C9A430;pointer-events:none;z-index:99}
.screen::before{top:20px;left:20px;border-top-width:2px;border-left-width:2px}
.screen::after{top:20px;right:20px;border-top-width:2px;border-right-width:2px}
.cbl,.cbr{position:fixed;width:44px;height:44px;border:0 solid #C9A430;z-index:99}
.cbl{bottom:20px;left:20px;border-bottom-width:2px;border-left-width:2px}
.cbr{bottom:20px;right:20px;border-bottom-width:2px;border-right-width:2px}

/* INTRO */
.big{font-size:clamp(42px,7.6vw,98px);color:#F0D060;letter-spacing:.12em;line-height:.88;text-align:center;animation:pulse 2.4s ease-in-out infinite alternate;text-shadow:0 0 24px rgba(240,208,96,.22),0 0 78px rgba(240,208,96,.14)}
@keyframes pulse{from{text-shadow:0 0 30px rgba(240,208,80,.3)}to{text-shadow:0 0 80px rgba(240,208,80,.8),0 0 120px rgba(240,208,80,.3)}}
.subtitle{font-size:18px;color:rgba(255,255,255,.3);letter-spacing:.24em;margin-top:16px;font-family:Arial,sans-serif;font-weight:700;text-align:center}
.divider{width:220px;height:2px;margin:24px auto;background:linear-gradient(90deg,transparent,rgba(201,164,48,.15),#F0D060,rgba(201,164,48,.15),transparent);box-shadow:0 0 18px rgba(240,208,96,.25)}
.bigbtn{position:relative;padding:16px 68px;border:1px solid rgba(255,241,186,.34);cursor:pointer;background:linear-gradient(135deg,rgba(162,120,24,.98),rgba(240,208,96,.98) 48%,rgba(168,124,20,.98));font-family:Impact,sans-serif;font-size:clamp(16px,2.2vw,24px);letter-spacing:.25em;color:#1A0900;clip-path:polygon(16px 0,calc(100% - 16px) 0,100% 50%,calc(100% - 16px) 100%,16px 100%,0 50%);transition:transform .15s ease,filter .15s ease,box-shadow .2s ease;box-shadow:0 16px 34px rgba(0,0,0,.28),0 0 30px rgba(240,208,96,.22);overflow:hidden}
.bigbtn::after{content:'';position:absolute;inset:-20% auto -20% -35%;width:40%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.38),transparent);transform:skewX(-18deg);animation:btnSweep 3.8s linear infinite}
.bigbtn:hover{transform:scale(1.05);filter:brightness(1.08);box-shadow:0 20px 38px rgba(0,0,0,.32),0 0 40px rgba(240,208,96,.3)}.bigbtn:active{transform:scale(.97)}
@keyframes btnSweep{0%{left:-45%}100%{left:135%}}
.fs-btn{
  position:fixed;top:22px;right:72px;z-index:120;
  width:34px;height:34px;padding:0;border:1px solid rgba(255,241,186,.14);border-radius:999px;
  background:rgba(8,12,28,.42);backdrop-filter:blur(8px);
  color:rgba(240,208,96,.78);font-family:Arial,sans-serif;font-size:16px;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .15s ease,filter .15s ease,background .15s ease,opacity .15s ease;
  box-shadow:0 8px 18px rgba(0,0,0,.16);opacity:.72
}
.fs-btn:hover{transform:translateY(-1px);filter:brightness(1.04);background:rgba(12,18,40,.56);opacity:.95}
.fs-btn:active{transform:translateY(0) scale(.98)}

/* REVEAL */
#intro{background:
  radial-gradient(circle at 50% 28%,rgba(240,208,96,.14),transparent 26%),
  radial-gradient(circle at 50% 100%,rgba(38,62,144,.22),transparent 34%)}
#reveal{cursor:pointer;padding:clamp(4px,.8vh,10px) 0 clamp(10px,1.6vh,18px);background:
  radial-gradient(circle at 50% 32%,rgba(240,208,96,.12),transparent 26%),
  radial-gradient(circle at 50% 74%,rgba(39,79,167,.18),transparent 32%)}
#round-header{position:relative;flex-shrink:0;text-align:center;width:min(960px,94vw);padding:clamp(8px,1.1vh,14px) 0 clamp(4px,.7vh,8px)}
#round-header::before{content:'';position:absolute;left:0;right:0;top:52%;height:1px;background:linear-gradient(90deg,transparent,rgba(240,208,96,.16),rgba(240,208,96,.4),rgba(240,208,96,.16),transparent)}
#round-header::after{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);width:min(480px,68vw);height:100%;background:radial-gradient(circle,rgba(240,208,96,.15),transparent 68%);filter:blur(18px);opacity:.8}
#round-header > *{position:relative;z-index:1}
#round-label{display:inline-block;font-size:clamp(24px,4.3vw,60px);color:#F0D060;letter-spacing:.18em;line-height:1;padding:0 clamp(16px,2vw,28px);text-shadow:0 0 20px rgba(240,208,96,.22),0 0 54px rgba(240,208,96,.16)}
#round-sublabel{font-family:Arial,sans-serif;font-size:clamp(10px,1.2vw,14px);font-weight:700;color:rgba(255,236,190,.54);letter-spacing:.24em;margin-top:7px;display:none}
#round-counter{display:inline-flex;align-items:center;justify-content:center;margin-top:8px;padding:5px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(6,10,24,.46);backdrop-filter:blur(8px);font-family:Arial,sans-serif;font-size:10px;letter-spacing:.28em;color:rgba(255,255,255,.45)}
#cards-row{position:relative;display:flex;align-items:center;justify-content:center;gap:clamp(8px,1.4vw,24px);flex:1;width:100%;padding:0 clamp(8px,1.2vw,24px) clamp(2px,.4vh,8px);min-height:0}
#cards-row::before{content:'';position:absolute;left:50%;bottom:2%;transform:translateX(-50%);width:min(1200px,88vw);height:32%;background:radial-gradient(circle,rgba(240,208,96,.18),rgba(90,64,255,.08) 40%,transparent 72%);filter:blur(26px);opacity:.95;pointer-events:none}

/* CARD SIZES */
.mode-solo    .ci,
.mode-solo-sp .ci { height:min(84vh,90vw); aspect-ratio:2/3 }
.mode-duo     .ci,
.mode-duo-intro .ci { height:min(78vh,46vw); aspect-ratio:2/3 }
.mode-triple  .ci { height:min(74vh,33vw); aspect-ratio:2/3 }
.mode-triple{gap:clamp(8px,1vw,18px);padding:0 clamp(6px,.8vw,18px)}
.mode-cook .ci { height:min(84vh,36vw); aspect-ratio:2/3 }
.mode-cook{gap:clamp(2px,.45vw,8px);padding:0 clamp(2px,.45vw,8px)}

/* CARD WRAPPER */
.cw{flex-shrink:0;perspective:1600px;filter:drop-shadow(0 20px 44px rgba(0,0,0,.38))}

/* CARD INNER — starts showing back face */
.ci{
  position:relative;
  transform-style:preserve-3d;
  transform:rotateY(0deg);    /* back face visible at start */
}

/* FACE BASE */
.face{position:absolute;inset:0;border-radius:18px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}

/* BACK FACE — at rotateY(0), visible at start */
.back-face{
  transform:rotateY(0deg);
  background:linear-gradient(160deg,#071021,#0A1124 52%,#120A1E);
  border:2.5px solid #C9A430;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -18px 40px rgba(0,0,0,.32)
}
.back-face::before{content:'';position:absolute;inset:10px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 22%,transparent 68%,rgba(255,210,120,.06))}
.back-face::after{content:'';position:absolute;left:18%;right:18%;top:20%;bottom:20%;background:radial-gradient(circle,rgba(240,208,96,.16),transparent 64%);filter:blur(28px)}
.bf-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(200,160,40,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(200,160,40,.1) 1px,transparent 1px);background-size:20px 20px}
.bf-inner{position:absolute;inset:14px;border:1px solid rgba(200,160,48,.18);border-radius:13px}
.bf-em{position:relative;z-index:2}
.bf-ring{width:min(96px,24%);height:min(96px,24%);border-radius:50%;border:3px solid #C9A430;background:rgba(4,2,0,.82);display:flex;align-items:center;justify-content:center;box-shadow:0 0 34px rgba(240,208,96,.18)}
.bf-ring2{width:76%;height:76%;border-radius:50%;border:1.5px solid rgba(200,160,48,.3);display:flex;align-items:center;justify-content:center;font-size:clamp(24px,4.8vh,56px);color:#C9A430}

/* FRONT FACE — at rotateY(180deg), hidden at start, visible when card reaches 180/540/900 */
.front-face{
  transform:rotateY(180deg);
  display:flex;flex-direction:column
}
.front-face::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05),transparent 22%,transparent 70%,rgba(0,0,0,.22));border-radius:13px;pointer-events:none;z-index:2}
@keyframes specbrd{0%{border-color:#CC44FF}25%{border-color:#FF44AA}50%{border-color:#44AAFF}75%{border-color:#44FFAA}100%{border-color:#CC44FF}}
.spec-border{animation:specbrd 2.5s linear infinite}

/* CARD CONTENT */
.card-photo-wrap{position:relative;flex:0 0 56%;padding:clamp(10px,1.4vh,16px) clamp(10px,1.4vh,16px) 0;z-index:1}
.card-photo{height:100%;border-radius:16px;overflow:hidden;position:relative;box-shadow:0 20px 38px rgba(0,0,0,.28)}
.card-photo::before{content:'';position:absolute;inset:0;background:linear-gradient(140deg,rgba(255,255,255,.12) 0%,transparent 32%,transparent 66%,rgba(255,255,255,.05) 100%);pointer-events:none;z-index:1}
.card-photo::after{content:'';position:absolute;left:-8%;top:-8%;width:44%;height:52%;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%);transform:rotate(2deg);pointer-events:none;mix-blend-mode:screen;opacity:.45;z-index:1}
.card-photo-shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,12,28,.04),rgba(10,12,28,0) 28%,rgba(3,5,14,.78) 74%,rgba(3,5,14,.92) 100%);pointer-events:none;z-index:2}
.card-photo-shade.compact{background:linear-gradient(180deg,rgba(10,12,28,.02),rgba(10,12,28,0) 46%,rgba(3,5,14,.34) 100%)}
.card-photo-img,.tc-photo-frame > .card-photo-img{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:cover;object-position:center 24%;transform:scale(1.01)}
.card-photo-img.compact{object-position:center 18%}
.card-minion{position:absolute;right:clamp(8px,1vh,12px);bottom:clamp(8px,1vh,12px);width:20%;aspect-ratio:1;border-radius:8px;overflow:hidden;border:2px solid;box-shadow:0 8px 20px rgba(0,0,0,.34)}
.card-minion-img{width:100%;height:100%;display:block;object-fit:cover;object-position:center}
.card-body{position:relative;z-index:3;display:flex;flex-direction:column;flex:1;min-height:0;margin:-34px clamp(10px,1.5vh,16px) clamp(10px,1.4vh,16px);padding:clamp(15px,1.95vh,22px) clamp(16px,2vh,24px) clamp(14px,1.6vh,20px);border-radius:20px;background:linear-gradient(180deg,rgba(10,12,28,.98),rgba(7,10,22,.96) 26%,rgba(7,10,22,.88) 100%);box-shadow:0 -12px 30px rgba(0,0,0,.24),0 18px 30px rgba(0,0,0,.2)}
.card-body::before{content:'';position:absolute;left:18px;right:18px;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent)}
.card-body::after{content:'';position:absolute;left:18px;right:18px;top:clamp(84px,11.2vh,102px);height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
.card-name{max-width:100%;font-family:Impact,sans-serif;font-size:clamp(26px,3.7vh,42px);line-height:1;letter-spacing:.1em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 14px rgba(255,255,255,.06)}
.card-meta{max-width:100%;margin-top:clamp(9px,1.1vh,13px);font-family:Arial,sans-serif;font-size:clamp(12px,1.42vh,16px);font-weight:700;letter-spacing:.12em;line-height:1.42;opacity:1;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info{display:flex;flex-direction:column;flex:1;min-height:0;margin-top:clamp(18px,2.2vh,26px);padding-top:clamp(6px,.65vh,10px)}
.info-row{position:relative;display:flex;flex-direction:column;justify-content:center;gap:clamp(5px,.55vh,8px);min-height:0;padding:clamp(11px,1.2vh,15px) 0 clamp(12px,1.3vh,16px) clamp(13px,1.5vh,18px)}
.info-row+.info-row{border-top:1px solid rgba(255,255,255,.09)}
.info-row::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:999px;background:linear-gradient(180deg,var(--row-accent),rgba(255,255,255,.12))}
.info-label{display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;font-size:clamp(10px,1.18vh,14px);font-weight:700;letter-spacing:.08em;line-height:1.2;opacity:.82;text-transform:uppercase}
.info-icon{display:inline-flex;align-items:center;justify-content:center;width:16px;min-width:16px;font-size:14px;line-height:1;opacity:.92;transform:translateY(-.5px)}
.info-value{max-width:100%;font-family:Arial,sans-serif;font-size:clamp(15px,2.1vh,24px);font-weight:700;letter-spacing:.015em;line-height:1.34;overflow:hidden;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.mode-triple .card-body,
.mode-cook .card-body{
  margin-top:-28px;
  padding:clamp(12px,1.4vh,16px) clamp(11px,1.3vh,15px) clamp(10px,1.15vh,14px);
}

.mode-triple .card-body::after,
.mode-cook .card-body::after{
  top:clamp(68px,9.8vh,84px);
}

.mode-triple .card-name,
.mode-cook .card-name{
  font-size:clamp(18px,2.55vh,28px);
  line-height:1.02;
  white-space:normal;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.mode-triple .card-meta,
.mode-cook .card-meta{
  font-size:clamp(10px,1.05vh,13px);
  line-height:1.28;
  white-space:normal;
}

.mode-triple .card-info,
.mode-cook .card-info{
  margin-top:clamp(12px,1.4vh,16px);
  padding-top:clamp(4px,.4vh,6px);
}

.mode-triple .info-row,
.mode-cook .info-row{
  gap:clamp(3px,.35vh,5px);
  padding:clamp(8px,.85vh,10px) 0 clamp(9px,.95vh,11px) clamp(9px,1vh,12px);
}

.mode-triple .info-label,
.mode-cook .info-label{
  font-size:clamp(9px,.92vh,11px);
  line-height:1.12;
}

.mode-triple .info-icon,
.mode-cook .info-icon{
  width:12px;
  min-width:12px;
  font-size:10px;
}

.mode-triple .info-value,
.mode-cook .info-value{
  font-size:clamp(12px,1.5vh,17px);
  line-height:1.22;
  -webkit-line-clamp:3;
}

.mode-cook .card-name{
  font-size:clamp(20px,2.9vh,32px);
}

.mode-cook .card-meta{
  font-size:clamp(11px,1.2vh,15px);
}

.mode-cook .info-label{
  font-size:clamp(10px,1.05vh,13px);
}

.mode-cook .info-value{
  font-size:clamp(14px,1.78vh,20px);
}
.shimmer-layer{position:absolute;inset:0;border-radius:13px;overflow:hidden;pointer-events:none;z-index:5}
.shimmer-layer::after{content:'';position:absolute;top:0;width:34%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.16),transparent);animation:shim 3.3s linear 1.8s infinite}
@keyframes shim{0%{left:-55%}100%{left:165%}}

/* ════════════════════════════════════════════════
   REVEAL ANIMATIONS
   All start with ci at rotateY(0) = back showing
   All end at rotateY(900deg) = front showing
   front-face is at rotateY(180deg) so it shows at
   180, 540, 900 degrees
   ════════════════════════════════════════════════ */

/* R1: SPLIT — cards rocket from opposite sides */
.anim-split-L{animation:splitL 1.7s cubic-bezier(.12,1.6,.32,1) forwards}
@keyframes splitL{
  0%  {transform:translateX(-110vw) rotateY(0deg)   rotateZ(-8deg) scale(.6)}
  22% {transform:translateX(8px)    rotateY(180deg)  rotateZ(2deg)  scale(1.07)}
  36% {transform:translateX(-3px)   rotateY(360deg)  rotateZ(0deg)  scale(.96)}
  52% {transform:translateX(0)      rotateY(540deg)               scale(1.05)}
  67% {transform:translateX(0)      rotateY(660deg)               scale(.985)}
  80% {transform:translateX(0)      rotateY(810deg)               scale(1.025)}
  91% {transform:translateX(0)      rotateY(875deg)               scale(.995)}
  100%{transform:translateX(0)      rotateY(900deg)               scale(1)}
}
.anim-split-R{animation:splitR 1.7s cubic-bezier(.12,1.6,.32,1) forwards}
@keyframes splitR{
  0%  {transform:translateX(110vw)  rotateY(0deg)   rotateZ(8deg)  scale(.6)}
  22% {transform:translateX(-8px)   rotateY(180deg)  rotateZ(-2deg) scale(1.07)}
  36% {transform:translateX(3px)    rotateY(360deg)  rotateZ(0deg)  scale(.96)}
  52% {transform:translateX(0)      rotateY(540deg)               scale(1.05)}
  67% {transform:translateX(0)      rotateY(660deg)               scale(.985)}
  80% {transform:translateX(0)      rotateY(810deg)               scale(1.025)}
  91% {transform:translateX(0)      rotateY(875deg)               scale(.995)}
  100%{transform:translateX(0)      rotateY(900deg)               scale(1)}
}

/* R2: METEOR DROP */
.anim-drop{animation:dropIn 1.75s cubic-bezier(.14,1.9,.35,1) forwards}
@keyframes dropIn{
  0%  {transform:translateY(-120vh) rotateX(70deg)  rotateY(0deg)   scale(.5) rotateZ(6deg)}
  24% {transform:translateY(14px)   rotateX(-10deg) rotateY(180deg) scale(1.08) rotateZ(-2deg)}
  37% {transform:translateY(-6px)   rotateX(3deg)   rotateY(360deg) scale(.95) rotateZ(0deg)}
  53% {transform:translateY(2px)    rotateX(0deg)   rotateY(540deg) scale(1.04)}
  68% {transform:translateY(0)                      rotateY(660deg) scale(.985)}
  81% {transform:translateY(0)                      rotateY(810deg) scale(1.025)}
  92% {transform:translateY(0)                      rotateY(875deg) scale(.995)}
  100%{transform:translateY(0)                      rotateY(900deg) scale(1)}
}

/* R3: BARREL ROLL */
.anim-barrel{animation:barrelIn 1.8s cubic-bezier(.3,0,.2,1) forwards}
@keyframes barrelIn{
  0%  {transform:rotateX(-130deg) rotateY(0deg)   scale(.35) translateY(-40px)}
  15% {transform:rotateX(12deg)   rotateY(0deg)   scale(1.05) translateY(0)}
  28% {transform:rotateX(-4deg)   rotateY(180deg) scale(.97)}
  44% {transform:rotateX(1deg)    rotateY(360deg) scale(1.06)}
  59% {transform:rotateX(0deg)    rotateY(540deg) scale(.985)}
  73% {transform:                 rotateY(720deg) scale(1.03)}
  86% {transform:                 rotateY(860deg) scale(.995)}
  100%{transform:                 rotateY(900deg) scale(1)}
}

/* R4: ZOOM BURST */
.anim-zoom{animation:zoomBurst 1.7s cubic-bezier(.14,1.5,.32,1) forwards}
@keyframes zoomBurst{
  0%  {transform:scale(0)    rotateZ(30deg)  rotateY(0deg)}
  16% {transform:scale(1.12) rotateZ(-6deg)  rotateY(180deg)}
  30% {transform:scale(.95)  rotateZ(2deg)   rotateY(360deg)}
  48% {transform:scale(1.06) rotateZ(0deg)   rotateY(540deg)}
  64% {transform:scale(.985)                 rotateY(660deg)}
  78% {transform:scale(1.03)                 rotateY(810deg)}
  91% {transform:scale(.995)                 rotateY(876deg)}
  100%{transform:scale(1)                    rotateY(900deg)}
}

/* R5: SLAM */
.anim-slam{animation:slamIn 1.55s cubic-bezier(.1,2,.35,1) forwards}
@keyframes slamIn{
  0%  {transform:translateY(-130vh) rotateY(0deg)   scale(.45)}
  25% {transform:translateY(16px)   rotateY(180deg) scale(1.09)}
  38% {transform:translateY(-7px)   rotateY(360deg) scale(.95)}

  return value != null && !EMPTY_VALUES.has(String(value).trim());
}

}

  <div class="face front-face${specCls}" style="background:${t.bg};border:3px solid ${t.border}">
    <div style="position:absolute;inset:8px;border-radius:10px;border:1px solid ${t.sheen};pointer-events:none;z-index:3"></div>
    <div class="card-photo-wrap">
      <div class="card-photo" style="background:${t.phBg};border:1px solid ${t.phBord};box-shadow:0 14px 30px rgba(0,0,0,.32)">
        ${renderPhoto(p,t)}
      </div>
    </div>
    <div class="card-body" style="background:linear-gradient(180deg,${t.nameBg},rgba(4,7,18,.96) 22%,${t.statBg} 100%);border:1px solid ${t.sep}">
      <div class="card-name" style="color:${t.nameC}">${p.name}</div>
      <div class="card-meta" style="color:${t.groupC}">${meta || '&nbsp;'}</div>
      <div class="card-info">
        ${rows.map(row=>`<div class="info-row" style="--row-accent:${t.border}">
          <div class="info-label" style="color:${t.lbl}"><span class="info-icon">${row.icon || ''}</span>${row.label}</div>
          <div class="info-value" style="color:${t.val}">${row.value}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="shimmer-layer"></div>
  </div>
</div></div>`;
}

const ANIM_DURATIONS = {
  'anim-split-L': 1700,
  'anim-split-R': 1700,
  'anim-drop': 1750,
  'anim-barrel': 1800,
  'anim-zoom': 1700,
  'anim-slam': 1550,
  'anim-slide-L': 1650,
  'anim-slide-R': 1650,
  'anim-twirl': 1900,
  'anim-rise': 2300,
  'anim-cascade': 1650
};

const FINAL_TRANSFORMS = {
  'anim-split-L': 'translateX(0) rotateY(900deg) scale(1)',
  'anim-split-R': 'translateX(0) rotateY(900deg) scale(1)',
  'anim-drop': 'translateY(0) rotateY(900deg) scale(1)',
  'anim-barrel': 'rotateY(900deg) scale(1)',
  'anim-zoom': 'scale(1) rotateY(900deg)',
  'anim-slam': 'translateY(0) rotateY(900deg) scale(1)',
  'anim-slide-L': 'translateX(0) rotateY(900deg) scale(1)',
  'anim-slide-R': 'translateX(0) rotateY(900deg) scale(1)',
  'anim-twirl': 'scale(1) rotateY(900deg)',
  'anim-rise': 'translateY(0) scale(1) rotateY(900deg)',
  'anim-cascade': 'translateY(0) rotateY(900deg) scale(1)'
};

let roundIdx = 0, flipped = false;

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function startPack(){roundIdx=0;show('reveal');buildRound(0)}

function fullscreenElement(){
  return document.fullscreenElement || document.webkitFullscreenElement || null;
}

function updateFullscreenButton(){
  const btn=document.getElementById('fullscreen-btn');
  if(!btn)return;
  const active=!!fullscreenElement();
  btn.textContent=active ? '✕' : '⛶';
  btn.setAttribute('aria-label', active ? 'Lukk fullskjerm' : 'Fullskjerm');
  btn.title=active ? 'Lukk fullskjerm' : 'Fullskjerm';
}

function toggleFullscreen(event){
  if(event){
    event.preventDefault();
    event.stopPropagation();
  }
  const root=document.documentElement;
  if(fullscreenElement()){
    if(document.exitFullscreen) document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    return;
  }
  if(root.requestFullscreen) root.requestFullscreen();
  else if(root.webkitRequestFullscreen) root.webkitRequestFullscreen();
}

document.addEventListener('fullscreenchange', updateFullscreenButton);
document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
updateFullscreenButton();

function buildRound(idx){
  const round=ROUNDS[idx]; flipped=false;
  document.getElementById('round-label').textContent=round.label||'';
  const sub=document.getElementById('round-sublabel');
  sub.textContent=round.sublabel||''; sub.style.display=round.sublabel?'block':'none';
  document.getElementById('round-counter').textContent=(idx+1)+' / '+ROUNDS.length;
  const row=document.getElementById('cards-row');
  row.className='mode-'+round.mode;
  row.innerHTML=round.cards.map(cardHTML).join('');
  row.querySelectorAll('.ci').forEach(ci=>{
    ci.style.transition='none';
    ci.style.transform='rotateY(0deg)';
  });
  document.getElementById('tapnext').classList.remove('show');
  Array.from(row.querySelectorAll('.cw')).forEach((cw,i)=>{
    cw.style.opacity='0';
    setTimeout(()=>{cw.style.transition='opacity .35s';cw.style.opacity='1'},80+i*130);
  });
}

function handleClick(e){if(e.target.closest('#tapnext'))return;if(!flipped)flipAll()}

function elementCenter(el){
  const rect=el.getBoundingClientRect();
  return {x:rect.left+rect.width/2,y:rect.top+rect.height/2};
}

function flipAll(){
  if(flipped)return; flipped=true;
  const round=ROUNDS[roundIdx];
  const cws=Array.from(document.querySelectorAll('#cards-row .cw'));
  const delays=round.delays||cws.map(()=>0);
  const maxDelay=Math.max(...delays);
  const dur=Math.max(...round.anims.map(anim=>ANIM_DURATIONS[anim]||1750));

  cws.forEach((cw,i)=>{
    const ci=cw.querySelector('.ci');
    const animCls=round.anims[i];
    const animDur=ANIM_DURATIONS[animCls]||1750;
    setTimeout(()=>{
      ci.style.transition='none';
      ci.classList.add(animCls);
      ci.addEventListener('animationend', ()=>{
        ci.classList.remove(animCls);
        ci.style.transform=FINAL_TRANSFORMS[animCls]||'rotateY(900deg)';
      }, {once:true});
    },delays[i]||0);
    setTimeout(()=>{
      const pos=elementCenter(cw);
      burst(pos.x,pos.y,round.cards[i].type);
      cw.animate([
        {filter:'drop-shadow(0 20px 44px rgba(0,0,0,.38))'},
        {filter:`drop-shadow(0 0 26px ${round.flashColor}) drop-shadow(0 22px 46px rgba(0,0,0,.42))`,offset:.45},
        {filter:'drop-shadow(0 20px 44px rgba(0,0,0,.38))'}
      ],{duration:820,easing:'ease-out'});
    },(delays[i]||0)+animDur*.84);
  });

  setTimeout(()=>screenFlash(round.flashColor), maxDelay+dur*.8);

  // Shake on slam
  if(round.anims[0]==='anim-slam'){
    setTimeout(()=>document.getElementById('reveal').classList.add('shaking'), maxDelay+dur*.33);
    setTimeout(()=>document.getElementById('reveal').classList.remove('shaking'), maxDelay+dur*.33+500);
  }

  setTimeout(()=>{
    const tn=document.getElementById('tapnext');
    tn.textContent=roundIdx<ROUNDS.length-1?'NESTE  ▶':'SE LEDERTEAMET  ▶';
    tn.classList.add('show');
  }, maxDelay+dur+80);
}

function nextRound(){
  roundIdx++;
  if(roundIdx>=ROUNDS.length){buildTeamOverview();show('done');return}
  const row=document.getElementById('cards-row');
  const tn=document.getElementById('tapnext');
  row.style.transition='opacity .25s';row.style.opacity='0';
  setTimeout(()=>{row.style.transition='';row.style.opacity='';tn.classList.remove('show');buildRound(roundIdx)},280);
}

function buildTeamOverview(){
  const allP=ROUNDS.flatMap(r=>r.cards);
  const grid=document.getElementById('team-grid');
  grid.innerHTML='';
  allP.forEach((p,i)=>{
    const t=TC[p.type];
    const card=document.createElement('div');
    card.className='team-card';
    card.style.animationDelay=(i*45)+'ms';
    card.style.background=t.bg;
    card.style.border='2.5px solid '+t.border;
    card.innerHTML=`
      <div class="tc-photo">
        <div class="tc-photo-frame" style="background:${t.phBg};border:1px solid ${t.phBord}">
          ${renderPhoto(p,t,true)}
        </div>
      </div>
      <div class="tc-name-bar" style="background:${t.nameBg};border-top:1px solid ${t.sep}">
        <div class="tc-name" style="color:${t.nameC}">${p.name}</div>
        <div class="tc-role" style="color:${t.lbl}">${p.tittel||p.group||''}</div>
        <div class="tc-group" style="color:${t.groupC}">${p.group}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function restart(){roundIdx=0;show('intro')}

function screenFlash(color){
  const el=document.getElementById('flash');el.style.background=color;
  el.animate([{opacity:0},{opacity:1,offset:.08},{opacity:.65,offset:.3},{opacity:0}],{duration:600,easing:'ease-out'});
}
function burst(cx,cy,type){
  const pals={gold:['#F0D060','#C9A430','#FFF','#FFE566'],silver:['#E8E8E8','#AAA','#FFF','#CCC'],special:['#EE99FF','#CC44FF','#FF44CC','#FFF','#88AAFF','#44FFCC']};
  const pal=pals[type];
  for(let i=0;i<52;i++){
    const el=document.createElement('div'),sz=4+Math.random()*13,col=pal[Math.floor(Math.random()*pal.length)],sq=Math.random()>.5;
    el.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;border-radius:${sq?'2px':'50%'};background:${col};pointer-events:none;z-index:9998;transform:translate(-50%,-50%)`;
    document.body.appendChild(el);
    const a=(i/52)*Math.PI*2+Math.random()*.5,d=90+Math.random()*200;
    el.animate([
      {transform:`translate(-50%,-50%) scale(1)`,opacity:1},
      {transform:`translate(calc(-50% + ${Math.cos(a)*d}px),calc(-50% + ${Math.sin(a)*d}px)) scale(0)`,opacity:0}
    ],{duration:650+Math.random()*500,easing:'cubic-bezier(0,0,.3,1)',fill:'forwards'}).onfinish=()=>el.remove();
  }
}
(function bgP(){
  const c=document.getElementById('bgc'),ctx=c.getContext('2d');let W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}resize();window.addEventListener('resize',resize);
  for(let i=0;i<55;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:.5+Math.random()*1.5,sp:.06+Math.random()*.16,o:Math.random()*.35});
  (function frame(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.y-=p.sp;if(p.y<-4){p.y=H+4;p.x=Math.random()*W}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,164,48,${p.o})`;ctx.fill()});requestAnimationFrame(frame)})();
})();
</script>
